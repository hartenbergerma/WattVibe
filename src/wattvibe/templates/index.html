<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
  
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Trainer Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>
  <style>
    :root { 
      --bg: #0f172a; 
      --card: #0c1c39; 
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --danger: #ef4444; 
      --danger-hover: #dc2626; 
    }

    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: var(--bg); 
      display: flex; 
      justify-content: center; 
      padding: 20px; 
      margin: 0; 
      color: var(--text-main);
    }

    .card { 
      background: var(--card); 
      width: 100%; 
      max-width: 500px; 
      padding: 24px; 
      border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
    }

    h1 { 
      font-size: 1.6rem; 
      margin: 0 0 20px 0; 
      color: #FF00FF; /* Hot Magenta */
      border-bottom: 2px solid #FF00FF; 
      padding-bottom: 12px; 
      text-align: center;
      text-shadow:
               0 0 3px #ddd, 
               0 0 10px #FF00FF;
      letter-spacing: 2px;
    }

    .stat-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 10px 0; 
      border-bottom: 1px solid var(--border); 
    }

    .label { 
      color: var(--text-muted); 
      text-transform: capitalize; 
      font-size: 0.9rem; 
      font-weight: 500;
    }

    .val { 
      font-weight: 700; 
      font-family: 'JetBrains Mono', monospace; 
      color: #fff;
    }

    .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
    .true { background: #14532d; color: #4ade80; } /* Dark green bg, neon text */
    .false { background: #7f1d1d; color: #fca5a5; } /* Dark red bg, light red text */

    .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border); display: inline-block; vertical-align: middle; margin-right: 8px; }
    
    .chart-container { margin-top: 25px; height: 180px; width: 100%; }
    
    #svg-container { width: 100%; max-width: 220px; margin: 0 auto 25px; /* filter: drop-shadow(0 0 8px rgba(0,0,0,0.2)); */ }
    #svg-container svg { width: 100%; height: auto; }

    /* SVG Overrides */
    .status-active, .status-active path { fill: #39FF14 !important; } /* Brighter green for dark mode */
    .status-inactive, .status-inactive path { fill: #475569 !important; }
    .light-off, .light-off path { fill: #475569 !important; }
    #mask { fill: var(--card) !important; } /* Match mask to card color */

    .controls { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
    .btn-restart { 
        background: var(--danger); color: white; border: none; padding: 12px; 
        border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
        width: 100%; font-size: 0.95rem;
    }
    .btn-restart:hover { background: var(--danger-hover); transform: translateY(-1px); }
    #restartMsg { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>WattVibe Status</h1>
    
    <div id="svg-container"></div>
    
    <div id="dashboard">Lade...</div>
    
    <div class="chart-container">
      <canvas id="powerChart"></canvas>
    </div>

    <div class="controls">
      <button id="restartBtn" class="btn-restart" onclick="triggerRestart()">Restart System</button>
      <div id="restartMsg"></div>
    </div>
  </div>

  <script>
    async function triggerRestart() {
      const btn = document.getElementById('restartBtn');
      const msg = document.getElementById('restartMsg');
      
      isRestarting = true;
      btn.disabled = true;
      msg.innerText = "System is rebooting...";

      try {
        const response = await fetch('/restart', { method: 'POST' });
        if (response.ok) {
          // Wait 5 seconds for the system to actually shut down/restart
          setTimeout(checkServerStatus, 5000);
        } else {
          msg.innerText = "Restart failed.";
          btn.disabled = false;
        }
      } catch (e) {
        msg.innerText = "Error contacting server.";
        btn.disabled = false;
      }
  }

  // Function to check if the server is back up
  async function checkServerStatus() {
      const msg = document.getElementById('restartMsg');
      msg.innerText = "Waiting for system...";
      
      try {
        // Try fetching status. If it succeeds, the server is back!
        await fetch('/status');
        window.location.reload(); 
      } catch (e) {
        // If it fails, wait 2 seconds and try again
        setTimeout(checkServerStatus, 2000);
      }
  }

    let powerData = Array(40).fill(0);
    let colorData = Array(40).fill('rgba(200, 200, 200, 0.5)');
    let myChart = null;
    let isRestarting = false;

    function getHSL(val) {
      if (!Array.isArray(val) || val.length < 2) return 'hsl(0, 0%, 80%)';
      const h = Math.round(val[0]);
      const s = Math.round(val[1] * 100);
      return `hsl(${h}, ${s}%, 50%)`;
    }

    async function loadSVG() {
      try {
        const response = await fetch('{{ url_for("static", filename="icon.svg") }}');
        const svgText = await response.text();
        const container = document.getElementById('svg-container');
        container.innerHTML = svgText;
        
        // Trigger an immediate update once the SVG is in the DOM
        // This prevents the SVG from being empty for the first 1-second interval
        update(initialData); 
      } catch (e) { console.error("SVG Load Error:", e); }
    }

    function updateStatusVisuals(data) {
      const svg = document.querySelector('#svg-container svg');
      if (!svg) return;

      const setStatus = (id, isActive) => {
        const el = svg.getElementById(id);
        if (el) {
          el.classList.toggle('status-active', isActive);
          el.classList.toggle('status-inactive', !isActive);
        }
      };

      // 1. Connection and Trainer (Groups)
      setStatus('connection', data.hub);
      setStatus('trainer', data.trainer);
      
      // 2. Power (Single Path)
      setStatus('power', data.trainer_power > 0);
      
      // 3. Light (Special Logic)
      const lightGroup = svg.getElementById('light');
      if (lightGroup) {
        const paths = lightGroup.querySelectorAll('path');
        if (data.light) {
          lightGroup.classList.remove('light-off');
          paths.forEach(p => {
            // Only color the shell, keep the details (#0c1c39) dark
            if (p.getAttribute('fill') !== '#0c1c39') {
              p.style.fill = getHSL(data.light_color);
            }
          });
        } else {
          // Light is OFF: Apply gray
          lightGroup.classList.add('light-off');
          paths.forEach(p => {
            if (p.getAttribute('fill') !== '#0c1c39') {
              p.style.fill = ""; // Clear inline so CSS .light-off takes over
            }
          });
        }
      }
    }

    function setupChart() {
      const ctx = document.getElementById('powerChart').getContext('2d');
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Array(40).fill(''),
          datasets: [{
            data: powerData,
            backgroundColor: colorData,
            borderRadius: 4,
            barPercentage: 0.8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          scales: { 
            y: { 
              beginAtZero: true, 
              suggestedMax: 300, 
              grid: { color: 'rgba(255, 255, 255, 0.05)' }, // Subtle grid
              ticks: { color: '#94a3b8', font: { size: 10 } } 
            },
            x: { 
              display: true, 
              grid: { display: false }, 
              ticks: { color: '#94a3b8', font: { size: 10 } } 
            } 
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    async function update() {
      if (isRestarting) return;
      try {
        const res = await fetch('/status');
        const data = await res.json();
        
        document.getElementById('dashboard').innerHTML = Object.entries(data).map(([k, v]) => `
          <div class="stat-row">
            <span class="label">${k.replace(/_/g, ' ')}</span>
            <span class="val">${
              k === 'light_color' ? `<span class="swatch" style="background:${getHSL(v)}"></span>` : 
              typeof v === 'boolean' ? `<span class="badge ${v}">${v ? 'ONLINE' : 'OFFLINE'}</span>` : 
              (v ?? '--')
            }</span>
          </div>
        `).join('');

        updateStatusVisuals(data);

        if (myChart) {
          powerData.push(parseFloat(data.trainer_power) || 0);
          powerData.shift();
          colorData.push(getHSL(data.light_color));
          colorData.shift();
          myChart.update('none');
        }
      } catch (e) { console.error("Update Error:", e); }
    }

    window.onload = () => {
      loadSVG();
      setupChart();
      setInterval(update, 1000);
    };
  </script>
</body>
</html>
