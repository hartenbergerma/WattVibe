<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
  
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Trainer Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>
  <style>
    :root { --bg: #f1f5f9; --card: #ffffff; --danger: #ef4444; --danger-hover: #dc2626; }
    body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
    .card { background: var(--card); width: 100%; max-width: 500px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h1 { font-size: 1.3rem; margin: 0 0 15px 0; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f8fafc; }
    .label { color: #64748b; text-transform: capitalize; font-size: 0.9rem; }
    .val { font-weight: 700; font-family: monospace; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    .true { background: #dcfce7; color: #15803d; }
    .false { background: #fee2e2; color: #b91c1c; }
    .swatch { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #ddd; display: inline-block; vertical-align: middle; margin-right: 8px; }
    .chart-container { margin-top: 20px; height: 200px; width: 100%; position: relative; }
    
    /* SVG Styles */
    #svg-container { width: 100%; max-width: 250px; margin: 0 auto 20px; }
    #svg-container svg { width: 100%; height: auto; }

    /* Universal status overrides (Active = Green, Inactive = Red) */
    .status-active, .status-active path { fill: #15803d !important; }
    .status-inactive, .status-inactive path { fill: #94a3b8 !important; }

    /* Light-specific states */
    .light-off, .light-off path { fill: #94a3b8 !important; }
    
    /* Lock the dark internal details of the light so they never change color */
    #light path[fill="#0c1c39"] { fill: #0c1c39 !important; }

    /* Masking and transitions */
    #mask { fill: #f1f5f9 !important; }
    #light { transition: fill 0.3s ease; }

    .controls { margin-top: 25px; border-top: 2px solid #f1f5f9; padding-top: 20px; text-align: center; }
    .btn-restart { 
        background: var(--danger); color: white; border: none; padding: 10px 20px; 
        border-radius: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        width: 100%; font-size: 0.9rem;
    }
    .btn-restart:hover { background: var(--danger-hover); }
    .btn-restart:disabled { background: #cbd5e1; cursor: not-allowed; }
    #restartMsg { font-size: 0.75rem; color: #64748b; margin-top: 8px; height: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Trainer Status</h1>
    
    <div id="svg-container"></div>
    
    <div id="dashboard">Lade...</div>
    
    <div class="chart-container">
      <canvas id="powerChart"></canvas>
    </div>

    <div class="controls">
      <button id="restartBtn" class="btn-restart" onclick="triggerRestart()">Restart System</button>
      <div id="restartMsg"></div>
    </div>
  </div>

  <script>
    let powerData = Array(40).fill(0);
    let colorData = Array(40).fill('rgba(200, 200, 200, 0.5)');
    let myChart = null;
    let isRestarting = false;

    function getHSL(val) {
      if (!Array.isArray(val) || val.length < 2) return 'hsl(0, 0%, 80%)';
      const h = Math.round(val[0]);
      const s = Math.round(val[1] * 100);
      return `hsl(${h}, ${s}%, 50%)`;
    }

    async function loadSVG() {
      try {
        // Change this line in your loadSVG function:
        const response = await fetch('{{ url_for("static", filename="icon.svg") }}');
        const svgText = await response.text();
        document.getElementById('svg-container').innerHTML = svgText;
      } catch (e) { console.error("SVG Load Error:", e); }
    }

    function updateStatusVisuals(data) {
      const svg = document.querySelector('#svg-container svg');
      if (!svg) return;

      const setStatus = (id, isActive) => {
        const el = svg.getElementById(id);
        if (el) {
          el.classList.toggle('status-active', isActive);
          el.classList.toggle('status-inactive', !isActive);
        }
      };

      // 1. Connection and Trainer (Groups)
      setStatus('connection', data.hub);
      setStatus('trainer', data.trainer);
      
      // 2. Power (Single Path)
      setStatus('power', data.trainer_power > 0);
      
      // 3. Light (Special Logic)
      const lightGroup = svg.getElementById('light');
      if (lightGroup) {
        const paths = lightGroup.querySelectorAll('path');
        if (data.light) {
          lightGroup.classList.remove('light-off');
          paths.forEach(p => {
            // Only color the shell, keep the details (#0c1c39) dark
            if (p.getAttribute('fill') !== '#0c1c39') {
              p.style.fill = getHSL(data.light_color);
            }
          });
        } else {
          // Light is OFF: Apply gray
          lightGroup.classList.add('light-off');
          paths.forEach(p => {
            if (p.getAttribute('fill') !== '#0c1c39') {
              p.style.fill = ""; // Clear inline so CSS .light-off takes over
            }
          });
        }
      }
    }

    function setupChart() {
      const ctx = document.getElementById('powerChart').getContext('2d');
      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Array(40).fill(''),
          datasets: [{
            data: powerData,
            backgroundColor: colorData,
            borderRadius: 5,
            barPercentage: 0.8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          scales: { 
            y: { beginAtZero: true, suggestedMax: 300, title: { display: true, text: 'Watt', font: { size: 10 } } },
            x: { display: true, grid: { display: false }, ticks: { callback: (val, index) => index-39 + "s", font: { size: 10 }, color: '#64748b' } } 
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    async function update() {
      if (isRestarting) return;
      try {
        const res = await fetch('/status');
        const data = await res.json();
        
        document.getElementById('dashboard').innerHTML = Object.entries(data).map(([k, v]) => `
          <div class="stat-row">
            <span class="label">${k.replace(/_/g, ' ')}</span>
            <span class="val">${
              k === 'light_color' ? `<span class="swatch" style="background:${getHSL(v)}"></span>` : 
              typeof v === 'boolean' ? `<span class="badge ${v}">${v ? 'ONLINE' : 'OFFLINE'}</span>` : 
              (v ?? '--')
            }</span>
          </div>
        `).join('');

        updateStatusVisuals(data);

        if (myChart) {
          powerData.push(parseFloat(data.trainer_power) || 0);
          powerData.shift();
          colorData.push(getHSL(data.light_color));
          colorData.shift();
          myChart.update('none');
        }
      } catch (e) { console.error("Update Error:", e); }
    }

    window.onload = () => {
      loadSVG();
      setupChart();
      setInterval(update, 1000);
    };
  </script>
</body>
</html>
